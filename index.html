<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XR Lab</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <!-- Recursos -->
    <a-assets>
      <a-asset-item id="modeloIndustrial" src="models/modelo.glb"></a-asset-item>
    </a-assets>

    <!-- Luces -->
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="2 4 3" intensity="1.5"></a-light>

    <!-- Modelo CAD -->
    <a-entity
      gltf-model="#modeloIndustrial"
      position="0 1 100"
      rotation="0 0 0"
      scale="1 1 1 ">
    </a-entity>

    <!-- Primitivas de la guía -->
    <a-box position="2 1 -4" rotation="0 45 0" color="#4CC3D9"></a-box>
    <a-sphere position="-2 1 -4" radius="1" color="#EF2D5E"></a-sphere>
    <a-cylinder position="0 1 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
    <a-plane rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>
    <a-sky color="#ECECEC"></a-sky>

    <!-- Cámara -->
    <a-entity position="0 1.6 0">
      <a-camera></a-camera>
    </a-entity>
  </a-scene>
</body>
</html>
