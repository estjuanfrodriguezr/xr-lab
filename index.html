<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XR Lab</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <a-asset-item id="modeloIndustrial" src="models/modelo.glb"></a-asset-item>
    </a-assets>

    <!-- luces -->
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 3 2" intensity="1.5"></a-light>

    <!-- modelo CAD -->
    <a-entity gltf-model="#modeloIndustrial"
              position="0 1 -4"
              rotation="0 0 0"
              scale="0.5 0.5 0.5">
    </a-entity>

    <!-- piso -->
    <a-plane rotation="-90 0 0" width="20" height="20" color="#B0BEC5"></a-plane>

    <!-- cielo -->
    <a-sky color="#ECECEC"></a-sky>

    <!-- cámara -->
    <a-entity position="0 1.6 0">
      <a-camera></a-camera>
    </a-entity>
  </a-scene>
</body>
</html>
